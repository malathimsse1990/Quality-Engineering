name: MultiEnvironmentExecution
 
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
 
jobs:
 
  login-dev:
    runs-on: ubuntu-latest
    environment: Dev
    steps:
      - uses: actions/checkout@v3
 
      - name: Docker login
        uses: docker/login-action@v2
        with:
          registry: registry-1.docker.io
          username: ${{ secrets.DOCKERHUBUSERNAME }}
          password: ${{ secrets.DOCKERHUBPASSWORD }}
 
  login-qa:
    runs-on: ubuntu-latest
    environment: QA
    steps:
      - uses: actions/checkout@v3
 
      - name: Docker login
        uses: docker/login-action@v2
        with:
          registry: registry-1.docker.io
          username: ${{ secrets.DOCKERHUBUSERNAME }}
          password: ${{ secrets.DOCKERHUBPASSWORD }}
